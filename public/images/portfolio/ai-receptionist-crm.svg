  <text x="96" y="790" fill="#FAFAFA" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="80" letter-spacing="-2">+ CRM</text>
  <text x="96" y="140" fill="#A1A1AA" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="8">MULTI-TENANT SAAS PLATFORM</text>
